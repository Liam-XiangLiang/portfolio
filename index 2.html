<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liam Liang | Concept Artist & Illustrator</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #111; color: #fff; }
        nav { padding: 40px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-weight: 300; letter-spacing: 2px; margin: 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 10px; padding: 10px; }

        .gallery img:hover { filter: grayscale(0%); transform: scale(1.02); }
        .footer { padding: 50px; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <h1>LIAM LIANG</h1>
        <div>CONCEPT ART / TRADING / DESIGN</div>
    </nav>

    <div class="gallery">
        <img src="images/work1.jpg" alt="Project 01">
        <img src="images/work2.jpg" alt="Project 02">
    </div>

    <div class="footer">
        © 2026 Liam Liang. Based in Los Angeles (Processing).
    </div>
</body>
</html>
