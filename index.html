<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM LIANG | Portfolio</title>
    <style>
        :root { --text-color: #1a1a1a; --sub-color: #888; --bg-color: #fff; }
        
        html, body { height: 100%; margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); overflow: hidden; }

        /* 导航栏：保持精致 */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 50px; box-sizing: border-box; 
            background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(15px); z-index: 1000;
        }
        .logo { font-size: 1rem; font-weight: 800; letter-spacing: 3px; text-decoration: none; color: var(--text-color); }
        .nav-links { display: flex; align-items: center; }
        .dropdown { position: relative; margin-left: 40px; }
        .dropdown > a { text-decoration: none; color: var(--text-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; padding: 10px 0; }
        .dropdown-content { 
            display: none; position: absolute; top: 40px; right: 0; 
            background: #fff; min-width: 200px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            padding: 10px 0; border-top: 2px solid #000;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: #1a1a1a; padding: 12px 20px; text-decoration: none; display: block; font-size: 0.75rem; text-transform: uppercase; }
        .about-link { text-decoration: none; color: #1a1a1a; margin-left: 40px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }

        /* 左右 6:4 布局容器 */
        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
            padding: 120px 60px 60px 60px; /* 增加全局留白 */
            box-sizing: border-box;
            gap: 40px;
        }

        /* 左侧：主作品 (60%) */
        .left-hero {
            flex: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .left-hero img {
            max-width: 100%;
            max-height: 100%;
            object-id: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.08));
            transition: transform 0.6s ease;
        }

        /* 右侧：分类区 (40%) */
        .right-menu-wrapper {
            flex: 4;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直居中，创造上下留白 */
            align-items: center;
        }

        /* 限制分类组的总高度为约左侧图片的 3/5 */
        .right-menu-content {
            width: 100%;
            max-width: 450px; /* 限制宽度增加精致感 */
            height: 55%; /* 核心：约占高度的 3/5 */
            display: flex;
            flex-direction: column;
            gap: 15px; /* 卡片之间的间距 */
        }

        .cat-item {
            flex: 1;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 2px;
        }

        .cat-item img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
            transition: 0.6s ease;
        }

        .cat-item span {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .cat-item:hover img { opacity: 0.7; transform: scale(1.05); }
        .cat-item:hover span { background: #fff; color: #000; border-color: #fff; }

        @media (max-width: 1024px) {
            .split-container { flex-direction: column; overflow-y: auto; height: auto; padding: 100px 20px 40px 20px; }
            html, body { overflow-y: auto; }
            .left-hero { height: 45vh; }
            .right-menu-content { height: auto; gap: 10px; }
            .cat-item { height: 120px; }
            footer { position: relative; bottom: 0; left: 0; text-align: center; padding: 20px 0; }
        }

        footer {
            position: fixed; bottom: 20px; left: 60px;
            color: #ccc; font-size: 0.6rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SAM LIANG</a>
        <div class="nav-links">
            <div class="dropdown">
                <a href="index.html" style="font-weight: bold;">Portfolio</a>
                <div class="dropdown-content">
                    <a href="comics.html">Comics & Storyboards</a>
                    <a href="film.html">Film Conceptart</a>
                    <a href="personal.html">Personal Works</a>
                </div>
            </div>
            <a href="about.html" class="about-link">About</a>
        </div>
    </nav>

    <main class="split-container">
        <section class="left-hero">
            <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773817266/samliang000_dngqzl.png" alt="Sam Liang Portfolio">
        </section>

        <section class="right-menu-wrapper">
            <div class="right-menu-content">
                <a href="comics.html" class="cat-item">
                    <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816254/CleanShot_2025-02-20_at_14.48.03_2x_c8vkck.png" alt="Comics">
                    <span>Comics & Storyboards</span>
                </a>
                <a href="film.html" class="cat-item">
                    <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816263/CleanShot_2025-02-20_at_14.58.26_2x_jt2u9w.png" alt="Film">
                    <span>Film Conceptart</span>
                </a>
                <a href="personal.html" class="cat-item">
                    <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816409/CleanShot_2025-02-20_at_22.50.23_2x_qutt6k.png" alt="Personal">
                    <span>Personal Works</span>
                </a>
            </div>
        </section>
    </main>

    <footer>© 2026 SAM LIANG. ALL RIGHTS RESERVED.</footer>

</body>
</html>
