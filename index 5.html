<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAM LIANG | Portfolio</title>
    <style>
        :root { --text-color: #1a1a1a; --sub-color: #888; --bg-color: #fff; --section-bg: #f7f7f7; }
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); }
        
        /* 导航栏 */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 30px 50px; box-sizing: border-box; background: rgba(255,255,255,0.95); z-index: 1000; }
        .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; text-decoration: none; color: var(--text-color); }
        .nav-links { display: flex; align-items: center; }

        /* 下拉菜单 */
        .dropdown { position: relative; display: inline-block; margin-left: 30px; }
        .dropdown > a { text-decoration: none; color: var(--text-color); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 10px; cursor: pointer; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: #fff; min-width: 180px; box-shadow: 0px 10px 30px rgba(0,0,0,0.08); z-index: 1; padding: 10px 0; border-top: 2px solid var(--text-color); }
        .dropdown-content a { color: var(--text-color); padding: 12px 20px; text-decoration: none; display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .dropdown-content a:hover { background-color: #f5f5f5; color: var(--sub-color); padding-left: 25px; }
        .dropdown:hover .dropdown-content { display: block; }

        .nav-links > a { text-decoration: none; color: var(--text-color); margin-left: 30px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* 首页大图区 */
        .hero { height: 90vh; display: flex; align-items: center; justify-content: center; background: #fff; }
        .hero img { width: 90%; height: 75%; object-fit: cover; max-width: 1200px; }

        /* 分类板块 - 视觉区分 */
        .category-section { background: var(--section-bg); padding: 100px 0; }
        .section-title { text-align: center; font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: var(--sub-color); margin-bottom: 50px; }
        .categories { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 0 50px; max-width: 1400px; margin: 0 auto; }
        
        .cat-item { position: relative; text-decoration: none; overflow: hidden; height: 350px; background: #ddd; }
        .cat-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); filter: brightness(0.9); }
        .cat-item:hover img { transform: scale(1.1); filter: brightness(1); }
        
        /* 这里的文字效果做了加强 */
        .cat-info { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%); opacity: 0.9; transition: 0.4s; }
        .cat-item:hover .cat-info { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); }
        .cat-title { color: #fff; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 1024px) { .categories { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .categories { grid-template-columns: 1fr; } nav { padding: 20px; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LIAM LIANG</a>
        <div class="nav-links">
            <div class="dropdown">
                <a href="index.html" style="font-weight: bold;">Portfolio</a>
                <div class="dropdown-content">
                    <a href="comics.html">Comics</a>
                    <a href="film.html">Film Conceptart</a>
                    <a href="personal.html">Personal Works</a>
                    <a href="others.html">Others works</a>
                </div>
            </div>
            <a href="about.html">About & Resume</a>
        </div>
    </nav>

    <section class="hero">
        <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773817266/samliang000_dngqzl.png" alt="Featured Work">
    </section>

    <div class="category-section">
        <div class="section-title">Explore Works</div>
        <section class="categories">
            <a href="comics.html" class="cat-item">
                <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816254/CleanShot_2025-02-20_at_14.48.03_2x_c8vkck.png" alt="Comics">
                <div class="cat-info"><div class="cat-title">Comics</div></div>
            </a>
            <a href="film.html" class="cat-item">
                <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816263/CleanShot_2025-02-20_at_14.58.26_2x_jt2u9w.png" alt="Film">
                <div class="cat-info"><div class="cat-title">Film Conceptart</div></div>
            </a>
            <a href="personal.html" class="cat-item">
                <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816409/CleanShot_2025-02-20_at_22.50.23_2x_qutt6k.png" alt="Personal">
                <div class="cat-info"><div class="cat-title">Personal Works</div></div>
            </a>
            <a href="others.html" class="cat-item">
                <img src="https://res.cloudinary.com/duzk5t3qp/image/upload/f_auto,q_auto/v1773816351/CleanShot_2025-02-20_at_19.33.25_2x_elrj0h.png" alt="Others">
                <div class="cat-info"><div class="cat-title">Others works</div></div>
            </a>
        </section>
    </div>

    <footer style="text-align: center; padding: 120px 50px; color: #bbb; font-size: 0.7rem; letter-spacing: 2px; background: #fff;">
        © 2026 LIAM LIANG. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
